<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réservation repas - Les Boucles de la Juine</title>
  <style>
    :root{
      --pink:#e91e79;
      --pink-dark:#c91869;
      --line:#f3cade;
      --text:#2b2b2b;
      --muted:#6d6d6d;
      --shadow:0 18px 48px rgba(233,30,121,.12);
      --shadow-soft:0 8px 24px rgba(233,30,121,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(233,30,121,.10), transparent 34%),
        linear-gradient(180deg,#ffffff 0%, #fff7fb 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px;
    }
    .box{
      width:min(720px,100%);
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      padding:42px 34px;
      text-align:center;
      box-shadow:var(--shadow);
    }
    img{
      width:120px;
      max-width:42%;
      margin:0 auto 22px;
      filter:drop-shadow(0 8px 16px rgba(233,30,121,.12));
    }
    .eyebrow{
      color:var(--pink);
      font-weight:800;
      letter-spacing:.08em;
      font-size:13px;
      text-transform:uppercase;
      margin-bottom:10px;
    }
    h1{
      color:var(--pink);
      font-size:clamp(32px,6vw,52px);
      line-height:.95;
      margin:0 0 18px;
      font-weight:900;
    }
    p{
      margin:0 auto 12px;
      max-width:560px;
      color:var(--muted);
      font-size:18px;
      line-height:1.55;
    }
    .note{
      margin-top:8px;
      color:var(--pink-dark);
      font-weight:800;
    }
    .actions{
      margin-top:28px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 24px;
      border-radius:16px;
      font-weight:800;
      text-decoration:none;
      transition:.2s ease;
    }
    .primary{
      background:linear-gradient(135deg,var(--pink),#ff4d9b);
      color:#fff;
      box-shadow:var(--shadow-soft);
    }
    .secondary{
      border:2px solid var(--pink);
      color:var(--pink);
      background:#fff;
    }
    a:hover{transform:translateY(-1px)}
  </style>
</head>
<body>
  <main class="box">
    <img src="assets/logo.png" alt="Les Boucles de la Juine" />
    <div class="eyebrow">Repas d'après-course</div>
    <h1>Réservations non ouvertes</h1>
    <p>Les réservations pour le repas d'après-course ne sont pas encore ouvertes.</p>
    <p class="note">Elles seront disponibles prochainement.</p>
    <div class="actions">
      <a class="primary" href="index.html#inscription">Retour au site</a>
    </div>
  </main>
</body>
</html>
